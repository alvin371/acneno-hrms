openapi: 3.0.3
info:
  title: Forbes Skin HRMS Mobile API
  version: 1.0.0
  description: |
    OpenAPI documentation for `application/controllers/Api_hrms.php`.

    Base path: `/api/hrms`
servers:
  - url: /
    description: Relative base URL
  - url: https://acnenosystem.com/
    description: Production
security:
  - BearerAuth: []
tags:
  - name: Auth
  - name: Profile
  - name: PIN
  - name: Config
  - name: Attendance
  - name: Holidays
  - name: Upload
  - name: Leave
  - name: Performance
  - name: Overtime
paths:
  /api/hrms/auth/login:
    post:
      tags: [Auth]
      summary: Login and issue access/refresh token
      description: Accepts any non-empty value from `email`, `username`, `identifier`, or `login` as the login identifier.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"

  /api/hrms/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRefreshRequest"
      responses:
        "200":
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRefreshResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"

  /api/hrms/profile:
    get:
      tags: [Profile]
      summary: Get authenticated user profile
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
    patch:
      tags: [Profile]
      summary: Update profile fields
      description: Controller also accepts POST/PUT for this same route.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/hrms/profile/password:
    post:
      tags: [Profile]
      summary: Change authenticated user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfilePasswordChangeRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/hrms/pin/setup:
    post:
      tags: [PIN]
      summary: Setup or replace 6-digit PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinSetupRequest"
      responses:
        "200":
          description: PIN configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/hrms/pin/verify:
    post:
      tags: [PIN]
      summary: Verify PIN, can return locked status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinVerifyRequest"
      responses:
        "200":
          description: PIN verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinVerifyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/hrms/pin/reset:
    post:
      tags: [PIN]
      summary: Reset PIN (requires password or admin role)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinResetRequest"
      responses:
        "200":
          description: PIN reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/hrms/config:
    get:
      tags: [Config]
      summary: Get office configuration overrides
      responses:
        "200":
          description: Config payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/hrms/attendance/office-proof:
    post:
      tags: [Attendance]
      summary: Validate WiFi office proof
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfficeProofRequest"
      responses:
        "200":
          description: Proof result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/hrms/attendance/status:
    get:
      tags: [Attendance]
      summary: Evaluate current attendance eligibility for office check-in/out
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: float
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: float
        - name: accuracy
          in: query
          required: true
          schema:
            type: number
            format: float
        - name: bssid
          in: query
          required: false
          schema:
            type: string
        - name: ssid
          in: query
          required: false
          schema:
            type: string
        - name: bssids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated BSSID list.
        - name: ssids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated SSID list.
      responses:
        "200":
          description: Attendance status evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/hrms/attendance/check-in:
    post:
      tags: [Attendance]
      summary: Check in attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceCheckRequest"
      responses:
        "200":
          description: Check-in saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceCheckResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/hrms/attendance/out-of-town/check-in:
    post:
      tags: [Attendance]
      summary: Check in Dinas Luar Kota attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceOutOfTownCheckRequest"
      responses:
        "200":
          description: Out-of-town check-in saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceCheckResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/hrms/attendance/out-of-town/check-out:
    post:
      tags: [Attendance]
      summary: Check out Dinas Luar Kota attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceOutOfTownCheckRequest"
      responses:
        "200":
          description: Out-of-town check-out saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceCheckResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/hrms/attendance/check-out:
    post:
      tags: [Attendance]
      summary: Check out attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceCheckRequest"
      responses:
        "200":
          description: Check-out saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceCheckResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/hrms/attendance/{id}/reason:
    post:
      tags: [Attendance]
      summary: Add or update late/early attendance reason and optional attachment
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceReasonRequest"
          multipart/form-data:
            schema:
              allOf:
                - $ref: "#/components/schemas/AttendanceReasonRequest"
                - type: object
                  properties:
                    attachment:
                      type: string
                      format: binary
      responses:
        "200":
          description: Reason saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceReasonResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/hrms/attendance/history:
    get:
      tags: [Attendance]
      summary: Get attendance logs for current user
      parameters:
        - $ref: "#/components/parameters/MonthParam"
      responses:
        "200":
          description: Attendance history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"

  /api/hrms/attendance/dashboard:
    get:
      tags: [Attendance]
      summary: Get monthly attendance dashboard statistics for current user
      parameters:
        - $ref: "#/components/parameters/MonthParam"
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceDashboardResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/hrms/attendance/recap:
    get:
      tags: [Attendance]
      summary: Get monthly attendance recap for current user
      parameters:
        - $ref: "#/components/parameters/MonthParam"
      responses:
        "200":
          description: Recap summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecapSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/hrms/attendance/recap-all:
    get:
      tags: [Attendance]
      summary: Get monthly attendance recap for all users (HR/Admin)
      parameters:
        - $ref: "#/components/parameters/MonthParam"
      responses:
        "200":
          description: Recap summary list
          content:
            application/json:
              schema:
                type: object
                properties:
                  month:
                    type: string
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/AttendanceRecapSummary"
                        - type: object
                          properties:
                            user:
                              $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/hrms/attendance/report:
    get:
      tags: [Attendance]
      summary: Get monthly attendance report with daily details
      parameters:
        - $ref: "#/components/parameters/MonthParam"
      responses:
        "200":
          description: Full report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceReportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/hrms/holidays:
    get:
      tags: [Holidays]
      summary: Get holiday list
      parameters:
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
      responses:
        "200":
          description: Holiday list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/HolidayItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/hrms/upload:
    post:
      tags: [Upload]
      summary: Upload attendance, leave, or profile attachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [type, file]
              properties:
                type:
                  type: string
                  enum: [attendance, leave, profile]
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/hrms/leave:
    get:
      tags: [Leave]
      summary: List current user leave requests
      responses:
        "200":
          description: Leave list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaveItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Leave]
      summary: Create leave request
      description: Attachment follows the selected leave type. If the chosen leave type has `requiresAttachment = true`, provide either an uploaded `attachment` file or an `attachment_path` value.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveCreateRequest"
          multipart/form-data:
            schema:
              allOf:
                - $ref: "#/components/schemas/LeaveCreateRequest"
                - type: object
                  properties:
                    attachment:
                      type: string
                      format: binary
      responses:
        "201":
          description: Leave created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveCreateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/hrms/leave/{id}:
    get:
      tags: [Leave]
      summary: Get leave detail
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Leave detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/hrms/leave/{id}/submit:
    post:
      tags: [Leave]
      summary: Submit draft leave request into approval workflow
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  id:
                    type: integer
                  status:
                    type: string
                  statusRaw:
                    type: string
                  workflow:
                    type: object
                    additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/hrms/leave/{id}/cancel:
    post:
      tags: [Leave]
      summary: Cancel leave request
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  id:
                    type: integer
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/hrms/leave/{id}/progress:
    get:
      tags: [Leave]
      summary: Get leave approval progress
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Approval progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: integer
                  status:
                    type: string
                  statusRaw:
                    type: string
                  instance:
                    type: object
                    additionalProperties: true
                  currentStep:
                    type: integer
                  totalSteps:
                    type: integer
                  workflowStatus:
                    type: string
                  steps:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/hrms/leave/approvals:
    get:
      tags: [Leave]
      summary: Get leave approval tasks for current approver
      parameters:
        - $ref: "#/components/parameters/ApprovalListStatusParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Leave approval task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveApprovalTaskListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/hrms/leave/approvals/{stepId}:
    get:
      tags: [Leave]
      summary: Get leave approval task detail for current approver
      parameters:
        - $ref: "#/components/parameters/StepIdParam"
      responses:
        "200":
          description: Leave approval detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveApprovalDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/hrms/leave/approvals/{stepId}/approve:
    post:
      tags: [Leave]
      summary: Approve leave approval step
      parameters:
        - $ref: "#/components/parameters/StepIdParam"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalActionRequest"
      responses:
        "200":
          description: Leave approval recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveApprovalActionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/hrms/leave/approvals/{stepId}/reject:
    post:
      tags: [Leave]
      summary: Reject leave approval step
      parameters:
        - $ref: "#/components/parameters/StepIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalActionRequest"
      responses:
        "200":
          description: Leave rejection recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveApprovalActionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /api/hrms/leave/approvals/history:
    get:
      tags: [Leave]
      summary: Get leave approval history for current approver
      parameters:
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Leave approval history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveApprovalTaskListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/hrms/leave/quota:
    get:
      tags: [Leave]
      summary: Get leave quota summary and list
      responses:
        "200":
          description: Quota list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveQuotaResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/hrms/leave/types:
    get:
      tags: [Leave]
      summary: Get active leave types with personal quota
      description: Returns active leave types together with quota information for the authenticated user. Use this to drive the leave creation form and pre-check quota and attachment requirements.
      responses:
        "200":
          description: Leave types with personal quota data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveTypesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/hrms/leave/quota/detail:
    get:
      tags: [Leave]
