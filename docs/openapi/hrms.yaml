components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    StepIdParam:
      name: stepId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ApprovalListStatusParam:
      name: status
      in: query
      required: false
      description: Approval task filter. Defaults to `pending`.
      schema:
        type: string
        enum: [pending, history, all]
    MonthParam:
      name: month
      in: query
      required: false
      description: Month format `YYYY-MM`.
      schema:
        type: string
        pattern: '^\\d{4}-\\d{2}$'
    StartDateParam:
      name: start
      in: query
      required: false
      schema:
        type: string
        format: date
    EndDateParam:
      name: end
      in: query
      required: false
      schema:
        type: string
        format: date
    PeriodYearParam:
      name: period_year
      in: query
      required: true
      schema:
        type: integer
    PeriodYearOptionalParam:
      name: period_year
      in: query
      required: false
      schema:
        type: integer
    StatusParam:
      name: status
      in: query
      required: false
      schema:
        type: string
    LeaveTypeIdQueryParam:
      name: leave_type_id
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    MethodNotAllowed:
      description: Method not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationFailed:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [status, message, code]
      properties:
        status:
          type: string
          example: error
        message:
          type: string
        code:
          type: string
        errors:
          type: object
          additionalProperties:
            type: string

    ValidationErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            code:
              type: string
              example: VALIDATION_FAILED
            errors:
              type: object
              additionalProperties:
                type: string

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        profilePicture:
          type: string
          nullable: true
        keterangan:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
        role_id:
          type: integer
          nullable: true
        role_name:
          type: string
          nullable: true
        roleInfo:
          $ref: "#/components/schemas/UserRoleInfo"
        position_id:
          type: integer
          nullable: true
        position_name:
          type: string
          nullable: true
        schedule:
          $ref: "#/components/schemas/UserSchedule"
        leave_quota:
          type: array
          items:
            $ref: "#/components/schemas/UserLeaveQuotaItem"

    UserLeaveQuotaItem:
      type: object
      properties:
        leave_type_id:
          type: integer
        leave_type_name:
          type: string
          nullable: true
        leave_type_code:
          type: string
          nullable: true
        total_days:
          type: integer
        remaining_days:
          type: integer
        status:
          type: string

    UserRoleInfo:
      type: object
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string
          nullable: true

    UserSchedule:
      type: object
      properties:
        start_time:
          type: string
        end_time:
          type: string
        source:
          type: string
        special_schedule:
          type: boolean

    AuthLoginRequest:
      type: object
      required: [password]
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        identifier:
          type: string
        login:
          type: string
        password:
          type: string

    AuthLoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    AuthRefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
        refresh_token:
          type: string

    AuthRefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    ProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        profilePicture:
          type: string
        keterangan:
          type: string
        phone:
          type: string
        phone_number:
          type: string

    ProfilePasswordChangeRequest:
      type: object
      required: [oldPassword, newPassword, passwordConfirmation]
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
        passwordConfirmation:
          type: string

    PinSetupRequest:
      type: object
      required: [pin]
      properties:
        pin:
          type: string
          pattern: '^\\d{6}$'

    PinVerifyRequest:
      type: object
      required: [pin]
      properties:
        pin:
          type: string

    PinVerifyResponse:
      type: object
      properties:
        ok:
          type: boolean
        locked:
          type: boolean
        lockedUntil:
          type: string
          nullable: true

    PinResetRequest:
      type: object
      properties:
        password:
          type: string

    WifiProof:
      type: object
      properties:
        bssid:
          type: string
        ssid:
          type: string
        bssids:
          type: array
          items:
            type: string
        ssids:
          type: array
          items:
            type: string

    OfficeProofRequest:
      type: object
      properties:
        wifiProof:
          $ref: "#/components/schemas/WifiProof"

    ConfigResponse:
      type: object
      required: [offices]
      properties:
        offices:
          type: array
          items:
            $ref: "#/components/schemas/OfficeConfig"
      example:
        offices:
          - id: 1
            name: Main Office
            location:
              lat: -8.793469
              lng: 115.1498025
            ip:
              allowed_cidrs:
                - 203.0.113.0/24
                - 198.51.100.10/32
            overrides:
              attendance:
                requires_ip: true
                min_accuracy_m: 50
                radius_m: 150
              wifi:
                allowed_ssids:
                  - Alvin
          - id: 2
            name: Side Office
            location:
              lat: -8.4341288
              lng: 114.1799393
            overrides:
              attendance:
                requires_ip: false
                min_accuracy_m: 50
                radius_m: 150
          - id: 4
            name: DOT Techno Valley
            location:
              lat: -7.927607
              lng: 112.600588
            overrides:
              attendance:
                requires_ip: false
                min_accuracy_m: 50
                radius_m: 150
              wifi:
                allowed_bssids:
                  - 48:22:54:b0:8b:4b
                allowed_ssids:
                  - DOT Techno Valley
          - id: 5
            name: My Office
            location:
              lat: -8.5121672
              lng: 114.2532438
            overrides:
              attendance:
                requires_ip: false
                min_accuracy_m: 200
                radius_m: 200
              wifi:
                allowed_bssids:
                  - d8:e8:44:4b:38:6b
                allowed_ssids:
                  - Wifi Rumah 1

    OfficeConfig:
      type: object
      required: [id, name, location, overrides]
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          $ref: "#/components/schemas/OfficeLocation"
        ip:
          $ref: "#/components/schemas/OfficeIpConfig"
        overrides:
          $ref: "#/components/schemas/OfficeConfigOverrides"

    OfficeLocation:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          format: float
        lng:
          type: number
          format: float

    OfficeIpConfig:
      type: object
      required: [allowed_cidrs]
      properties:
        allowed_cidrs:
          type: array
          items:
            type: string

    OfficeConfigOverrides:
      type: object
      required: [attendance]
      properties:
        attendance:
          $ref: "#/components/schemas/OfficeAttendanceOverride"
        wifi:
          $ref: "#/components/schemas/OfficeWifiOverride"

    OfficeAttendanceOverride:
      type: object
      required: [requires_ip, min_accuracy_m, radius_m]
      properties:
        requires_ip:
          type: boolean
        min_accuracy_m:
          type: integer
          description: Minimum acceptable GPS accuracy in meters.
        radius_m:
          type: integer
          description: Geofence radius in meters.

    OfficeWifiOverride:
      type: object
      properties:
        allowed_bssids:
          type: array
          items:
            type: string
        allowed_ssids:
          type: array
          items:
            type: string

    AttendanceCheckRequest:
      type: object
      required: [lat, lng, gpsAccuracy]
      properties:
        lat:
          type: number
          format: float
        lng:
          type: number
          format: float
        gpsAccuracy:
          type: number
          format: float
        accuracy:
          type: number
          format: float
        wifiProof:
          $ref: "#/components/schemas/WifiProof"

    AttendanceOutOfTownCheckRequest:
      type: object
      required: [attachmentPath]
      properties:
        dinasLocation:
          type: string
          example: Borobudur, Jogjakarta
        notes:
          type: string
          nullable: true
        attachmentPath:
          type: string
        photoPath:
          type: string

    AttendanceCategory:
      type: string
      enum: [REGULAR, OUT_OF_TOWN]

    AttendanceFlags:
      type: object
      properties:
        late:
          type: boolean
        early_checkout:
          type: boolean
        special_schedule:
          type: boolean

    AttendanceMinutes:
      type: object
      properties:
        late:
          type: integer
          nullable: true
        early_checkout:
          type: integer
          nullable: true

    AttendanceSchedule:
      type: object
      properties:
        start_time:
          type: string
        end_time:
          type: string
        source:
          type: string

    AttendanceStatusSchedule:
      allOf:
        - $ref: "#/components/schemas/AttendanceSchedule"
        - type: object
          properties:
            late_threshold:
              type: string
            early_threshold:
              type: string
            is_special:
              type: boolean

    AttendanceOfficeRef:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    AttendanceStatusOffice:
      allOf:
        - $ref: "#/components/schemas/AttendanceOfficeRef"
        - type: object
          properties:
            lat:
              type: number
              format: float
            lng:
              type: number
              format: float
            radius_m:
              type: integer
            min_accuracy_m:
              type: integer

    AttendanceStatusUserLocation:
      type: object
      properties:
        lat:
          type: number
          format: float
        lng:
          type: number
          format: float
        accuracy:
          type: number
          format: float

    AttendanceStatusComputed:
      type: object
      properties:
        inside_radius:
          type: boolean
        distance_m:
          type: number
          format: float
        ip_ok:
          type: boolean
        can_confirm:
          type: boolean
        reasons:
          type: array
          items:
            type: string

    AttendanceStatusWifi:
      type: object
      properties:
        has_rules:
          type: boolean
        provided:
